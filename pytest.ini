[pytest]
# Diretórios de teste
testpaths = tests
pythonpath = .

# Padrões de arquivos/funções de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --disable-warnings

# Markers personalizados
markers =
    slow: marca testes que demoram mais (deselect com '-m "not slow"')
    integration: marca testes de integração
    unit: marca testes unitários
    requires_api: marca testes que requerem API key

# Configurações de cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
