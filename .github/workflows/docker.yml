name: Docker Build and Push

# Workflow to build and optionally push Docker images to Docker Hub
# Build and test always runs; push only on successful build and when secrets are available

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Verify requirements.txt
        run: |
          echo "=== requirements.txt content ==="
          cat requirements.txt | grep -E "(pydantic|typing-extensions)"
          echo "================================"
      
      - name: Build and test Docker image
        run: |
          docker build --no-cache -t datadialogue:test .
          docker run --rm datadialogue:test python -c "import streamlit; import src.agents.sql_agent; import src.utils.database; print('Docker image OK')"
      
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && github.repository == 'Nik0o0lps/DataDialogue'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true
      
      - name: Extract metadata
        if: github.event_name != 'pull_request' && github.repository == 'Nik0o0lps/DataDialogue'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/datadialogue
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
        continue-on-error: true
      
      - name: Push to Docker Hub
        if: github.event_name != 'pull_request' && steps.meta.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

